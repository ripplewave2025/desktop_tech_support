- issue_id: smart-home-security-unlock
  title: Unlock a smart lock
  route: SmartHomeAgent
  summary: Unlock a smart lock. Policy engine upgrades this to an
    irreversible manual-gate action automatically.
  tags: ["unlock the door", "unlock front door", "unlock the front",
         "open the door", "unlock door"]
  oems: ["generic"]
  sources:
    - title: Local unlock recipe
      url: local://knowledge-pack/smart-home-security-unlock
      snippet: ask_user(entity) + manual confirmation + smart_home_call(unlock).
      officialness: local
      confidence: 0.9
      source_type: knowledge_pack
      risk: high
  steps:
    - step_id: unlock-ask
      title: Which lock?
      description: Usually entity_id like "lock.front_door".
      kind: tool
      agent_name: SmartHomeAgent
      tool_name: ask_user
      tool_args:
        prompt: "Which lock should I unlock?"
        field_name: sh_lock
      requires_confirmation: false
    - step_id: unlock-manual-gate
      title: Confirm before unlocking
      description: Unlocking a physical door is a high-stakes action —
        we pause here for an explicit confirmation before calling.
      kind: manual
      agent_name: SmartHomeAgent
      tool_name: ""
      tool_args: {}
      requires_confirmation: true
      irreversible: true
      manual_gate: true
    - step_id: unlock-call
      title: Unlock the door
      description: Fire the unlock action. Policy engine will also gate
        this at runtime because the action is in the destructive list.
      kind: tool
      agent_name: SmartHomeAgent
      tool_name: smart_home_call
      tool_args:
        entity_id: "{user.sh_lock}"
        action: unlock
      requires_confirmation: true
      manual_gate: true

- issue_id: smart-home-security-arm
  title: Arm the security system
  route: SmartHomeAgent
  summary: Arm a connected alarm panel in away, home, or night mode.
  tags: ["arm the alarm", "arm security", "set alarm to away",
         "arm away", "arm night", "night mode alarm"]
  oems: ["generic"]
  sources:
    - title: Local arm recipe
      url: local://knowledge-pack/smart-home-security-arm
      snippet: ask_user(panel) + select_from_list(mode) + manual gate + smart_home_call(arm).
      officialness: local
      confidence: 0.85
      source_type: knowledge_pack
      risk: high
  steps:
    - step_id: arm-ask-panel
      title: Which alarm panel?
      description: Entity_id like "alarm_control_panel.home".
      kind: tool
      agent_name: SmartHomeAgent
      tool_name: ask_user
      tool_args:
        prompt: "Which alarm panel?"
        field_name: sh_alarm
      requires_confirmation: false
    - step_id: arm-pick-mode
      title: Which arm mode?
      description: Home / Away / Night — each maps to a different HA service.
      kind: tool
      agent_name: SmartHomeAgent
      tool_name: select_from_list
      tool_args:
        prompt: "Which arm mode?"
        field_name: sh_arm_mode
        choices:
          - label: "Arm home"
            value: arm_home
          - label: "Arm away"
            value: arm_away
          - label: "Arm night"
            value: arm_night
      requires_confirmation: false
    - step_id: arm-manual-gate
      title: Confirm arming
      description: Arming an alarm can trigger alerts and false alarms —
        pause for explicit confirmation.
      kind: manual
      agent_name: SmartHomeAgent
      tool_name: ""
      tool_args: {}
      requires_confirmation: true
      manual_gate: true
    - step_id: arm-call
      title: Arm the system
      description: Call the chosen arm action. Runtime policy will also
        gate this because arm_* is in the destructive actions set.
      kind: tool
      agent_name: SmartHomeAgent
      tool_name: smart_home_call
      tool_args:
        entity_id: "{user.sh_alarm}"
        action: "{user.sh_arm_mode}"
      requires_confirmation: true
      manual_gate: true
