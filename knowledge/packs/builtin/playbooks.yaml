      manual_gate: true
    - step_id: install-launch
      title: Launch the installer
      description: Start the selected installer.
      kind: tool
      agent_name: WindowsAgent
      tool_name: launch_app
      tool_args:
        path: "{user.installer_path}"
      requires_confirmation: false
    - step_id: install-wizard
      title: Click through the setup wizard
      description: Walk the installer's Next/Agree/Install/Finish screens.
      kind: tool
      agent_name: WindowsAgent
      tool_name: gui_wizard_next
      tool_args:
        max_steps: 12
        step_delay_s: 1.5
      requires_confirmation: false
    - step_id: install-notify-done
      title: Notify when the installer reports done
      description: Let the user know the wizard finished so they can verify
        the app launched correctly.
      kind: tool
      agent_name: WindowsAgent
      tool_name: notify
      tool_args:
        title: Installer finished
        message: "The setup wizard reported completion. Please verify the app launches."
      requires_confirmation: false
